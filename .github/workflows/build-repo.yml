name: Build & Deploy CaramOS Repo

on:
  push:
    branches: [main]
    paths:
      - 'PKGBUILDs/**'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Bootstrap Arch container
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git sudo github-cli

      - name: Create build user
        run: |
          useradd -m builder && echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build all packages
        run: |
          chown -R builder:builder .
          chmod +x scripts/build-and-release.sh
          sudo -u builder ./scripts/build-and-release.sh

      - name: Generate pacman repo database
        run: |
          cd repo
          repo-add caramos.db.tar.gz *.pkg.tar.zst

      - name: Upload repo as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: caramos-repo
          path: repo/
          retention-days: 90

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: repo-${{ github.run_id }}
          name: CaramOS Package Repository (${{ github.event.repository.updated_at }})
          body: |
            Auto-built pacman repository for CaramOS custom packages.
            Build triggered by ${{ github.actor }} on ${{ github.ref_type }} ${{ github.ref_name }}.
          files: repo/*
          fail_on_unmatched_files: false
          make_latest: true
