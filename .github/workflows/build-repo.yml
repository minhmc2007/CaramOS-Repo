name: Build & Deploy CaramOS Repo

on:
  push:
    branches: [main]
    paths:
      - 'PKGBUILDs/**'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Bootstrap Arch container
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git sudo

      - name: Create build user
        run: |
          useradd -m builder && echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build all packages
        run: |
          chown -R builder:builder .
          chmod +x scripts/build-and-release.sh
          sudo -u builder ./scripts/build-and-release.sh

      - name: Generate pacman repo database
        run: |
          cd repo
          repo-add caramos.db.tar.gz *.pkg.tar.zst

      - name: Upload repo as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: caramos-repo
          path: repo/
          retention-days: 90

      - name: Create/Update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="repo-$(date +%Y%m%d%H%M%S)"
          gh release create "$TAG_NAME" repo/* \
            --title "CaramOS Package Repository ($(date +%Y-%m-%d))" \
            --notes "Auto-built pacman repository for CaramOS custom packages." \
            --latest
